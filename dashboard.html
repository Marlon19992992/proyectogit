<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Control - Slider</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div class="container">
        <div id="slider-container">
            <img id="foto" src="https://via.placeholder.com/400x200?text=Cargando..." width="400">
        </div>
        <div class="controles">
            <button onclick="retroceder()">Anterior</button>
            <button onclick="avanzar()">Siguiente</button>
        </div>
        <hr>
        <input type="text" id="urlNueva" placeholder="URL de la imagen">
        <button id="btnAgregar">Agregar con AJAX</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
