<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Moderno</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container" id="loginCard">
        <h2>Iniciar Sesión</h2>
        <form id="loginForm">
            <div class="input-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" placeholder="Ingresa tu nombre" required>
            </div>
            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login">Entrar</button>
        </form>
        <p id="errorMessage" class="error-msg"></p>
    </div>

    <div id="welcomeScreen" class="welcome-container hidden">
        <h1 id="welcomeMessage"></h1>
        <button onclick="location.reload()" class="btn-logout">Cerrar Sesión</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
